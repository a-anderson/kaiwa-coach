# Example configuration for KaiwaCoach

session:
  language: "ja"  # or "fr" or "en"

models:
  asr_id: "mlx-community/whisper-large-v3-mlx"
  llm_id: "mlx-community/Qwen3-14B-8bit"  # or "mlx-community/Qwen3-14B-bf16" for full precision
  tts_id: "mlx-community/Kokoro-82M-bf16"

llm:
  max_context_tokens: 4096
  conversation_temperature: 0.7  # applied to conversation role only; corrections stay at 0.0
  role_max_new_tokens:
    conversation: 256
    jp_tts_normalisation: 192
    detect_and_correct: 96   # combined error detection + correction
    explain_and_native: 144  # combined explanation + native rewrite

storage:
  root_dir: "storage"
  expected_sample_rate: 16000  # set null to disable validation

tts:
  voice: "default"
  speed: 1.0

logging:
  timing_logs: true
